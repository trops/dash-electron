<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Dash" />
        <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <title>Dash</title>
        <script>
            window.global = window;
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script>
            console.log("===== HTML LOADED =====");
            console.log(
                "Root element exists:",
                !!document.getElementById("root")
            );

            // Check if bundle script is loaded
            window.addEventListener("DOMContentLoaded", () => {
                const scripts = document.getElementsByTagName("script");
                console.log("Total scripts found:", scripts.length);
                for (let script of scripts) {
                    console.log("Script src:", script.src || "inline");
                }
            });

            // Early-boot error logger. Does NOT inject DOM — widget
            // preview errors are isolated by WidgetBuilderModal's
            // scoped handler; everything else falls through to React
            // error boundaries and DevTools. Appending error divs to
            // body was blocking clicks whenever any widget threw.
            //
            // While the AI Widget Builder modal is open it sets
            // `window.__DASH_WIDGET_BUILDER_OPEN`. AI-generated widgets
            // routinely throw (process.cwd, undefined imports, etc.)
            // during their first render — those go through the modal's
            // own scoped handler + PreviewErrorBoundary, which already
            // shows the user a friendly error + "Send error to AI"
            // recovery action. Spamming the global console with stack
            // traces on top of that is just noise that makes the user
            // think the app is broken when it actually caught the
            // error cleanly.
            window.addEventListener(
                "error",
                function (e) {
                    if (window.__DASH_WIDGET_BUILDER_OPEN) return;
                    console.error("Global error:", e.error || e.message);
                },
                true
            );
            window.addEventListener(
                "unhandledrejection",
                function (e) {
                    if (window.__DASH_WIDGET_BUILDER_OPEN) return;
                    console.error(
                        "Unhandled rejection:",
                        e.reason || e.message
                    );
                },
                true
            );
        </script>
    </body>
</html>
