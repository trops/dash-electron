<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Dash" />
        <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <title>Dash</title>
        <script>
            window.global = window;
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script>
            console.log("===== HTML LOADED =====");
            console.log(
                "Root element exists:",
                !!document.getElementById("root")
            );

            // Check if bundle script is loaded
            window.addEventListener("DOMContentLoaded", () => {
                const scripts = document.getElementsByTagName("script");
                console.log("Total scripts found:", scripts.length);
                for (let script of scripts) {
                    console.log("Script src:", script.src || "inline");
                }
            });

            // Early-boot error logger. Does NOT inject DOM — widget
            // preview errors are isolated by WidgetBuilderModal's
            // scoped handler; everything else falls through to React
            // error boundaries and DevTools. Appending error divs to
            // body was blocking clicks whenever any widget threw.
            //
            // Two suppression paths, both prevent duplicate console
            // noise that makes the user think the app crashed when
            // an error boundary actually caught the failure:
            //
            // 1. While the AI Widget Builder modal is open it sets
            //    `window.__DASH_WIDGET_BUILDER_OPEN`. The modal's
            //    own scoped handler + PreviewErrorBoundary show the
            //    friendly recovery UI, so we skip the global log.
            //
            // 2. When the error's stack contains `evaluateBundle`,
            //    the throw originated inside an AI widget bundle —
            //    on the dashboard, dash-core's WidgetErrorBoundary
            //    in WidgetFactory catches it and renders the inline
            //    error card. In dev mode React rethrows so DevTools
            //    can see the trace; we don't want to log it AGAIN
            //    at the global level.
            function isWidgetBundleError(e) {
                var stack =
                    (e && e.error && e.error.stack) ||
                    (e && e.reason && e.reason.stack) ||
                    "";
                return (
                    typeof stack === "string" &&
                    stack.indexOf("evaluateBundle") >= 0
                );
            }
            window.addEventListener(
                "error",
                function (e) {
                    if (window.__DASH_WIDGET_BUILDER_OPEN) return;
                    if (isWidgetBundleError(e)) return;
                    console.error("Global error:", e.error || e.message);
                },
                true
            );
            window.addEventListener(
                "unhandledrejection",
                function (e) {
                    if (window.__DASH_WIDGET_BUILDER_OPEN) return;
                    if (isWidgetBundleError(e)) return;
                    console.error(
                        "Unhandled rejection:",
                        e.reason || e.message
                    );
                },
                true
            );
        </script>
    </body>
</html>
