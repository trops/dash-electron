name: Release App

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag (e.g. v0.0.110)"
                required: false

permissions:
    contents: write
    packages: read

jobs:
    build-macos:
        runs-on: macos-latest
        steps:
            - name: Resolve release tag
              run: |
                  if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                      echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
                  elif [[ -n "${{ inputs.tag }}" ]]; then
                      echo "RELEASE_TAG=${{ inputs.tag }}" >> $GITHUB_ENV
                  fi

            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: "22"
                  registry-url: "https://npm.pkg.github.com"

            - name: Install dependencies
              run: npm ci --legacy-peer-deps
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}

            - name: Set app name
              run: |
                  APP_NAME=$(node -p "require('./package.json').productName || 'Dash'")
                  echo "REACT_APP_PACKAGE_NAME=$APP_NAME" >> $GITHUB_ENV
                  echo "REACT_APP_APP_NAME=$APP_NAME" >> $GITHUB_ENV

            - name: Prepare environment
              run: cp .env.default .env

            - name: Install Apple certificate
              env:
                  APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  KEYCHAIN_PASSWORD: ${{ github.run_id }}
              run: |
                  CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
                  KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

                  echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

                  security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

                  security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
                      -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
                  security set-key-partition-list -S apple-tool:,apple: \
                      -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security list-keychain -d user -s $KEYCHAIN_PATH

            - name: Build Tailwind CSS
              run: npm run build:css

            - name: Build React app
              run: npx craco build
              env:
                  REACT_APP_APPLE_CERT_ID: ${{ secrets.APPLE_CERT_ID }}
                  REACT_APP_APPLE_ID: ${{ secrets.APPLE_ID }}
                  REACT_APP_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  REACT_APP_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

            - name: Build Electron app
              run: |
                  sudo sysctl -w kern.maxfiles=524288
                  sudo sysctl -w kern.maxfilesperproc=524288
                  ulimit -n 524288
                  npx electron-forge make --arch=universal
              env:
                  NODE_ENV: production
                  REACT_APP_APPLE_CERT_ID: ${{ secrets.APPLE_CERT_ID }}
                  REACT_APP_APPLE_ID: ${{ secrets.APPLE_ID }}
                  REACT_APP_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  REACT_APP_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

            - name: Verify app signature
              run: |
                  APP_PATH=$(find out -name "*.app" -maxdepth 3 | head -1)
                  echo "=== App signature ==="
                  codesign --verify --deep --strict "$APP_PATH" && echo "App signature: OK"
                  echo "=== App assessment ==="
                  spctl --assess --type execute "$APP_PATH" && echo "App assessment: OK"

            - name: Notarize and staple DMG
              env:
                  REACT_APP_APPLE_ID: ${{ secrets.APPLE_ID }}
                  REACT_APP_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  REACT_APP_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  DMG_PATH=$(find out/make -name "*.dmg" | head -1)
                  if [ -n "$DMG_PATH" ]; then
                      xcrun notarytool submit "$DMG_PATH" \
                          --apple-id "$REACT_APP_APPLE_ID" \
                          --password "$REACT_APP_APPLE_PASSWORD" \
                          --team-id "$REACT_APP_APPLE_TEAM_ID" \
                          --wait
                      xcrun stapler staple "$DMG_PATH"
                  fi

            - name: Upload to GitHub Release
              if: env.RELEASE_TAG != ''
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  TAG="${{ env.RELEASE_TAG }}"
                  FILES=$(find out/make -name "*.dmg" -o -name "*.zip" | tr '\n' ' ')
                  if [ -z "$FILES" ]; then
                      echo "No .dmg or .zip files found in out/make"
                      find out/make -type f
                      exit 1
                  fi
                  echo "Found artifacts: $FILES"
                  for i in 1 2 3; do
                      if gh release view "$TAG" &>/dev/null; then
                          gh release upload "$TAG" $FILES --clobber && exit 0
                      else
                          gh release create "$TAG" $FILES --generate-notes && exit 0
                      fi
                      echo "Attempt $i failed, retrying in 30s..."
                      sleep 30
                  done
                  echo "All upload attempts failed"
                  exit 1

            - name: Upload as artifact
              if: env.RELEASE_TAG == ''
              uses: actions/upload-artifact@v6
              with:
                  name: electron-app-macos
                  path: |
                      out/make/**/*.dmg
                      out/make/**/*.zip

            - name: Clean up keychain
              if: always()
              run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

    build-windows:
        runs-on: windows-latest
        steps:
            - name: Resolve release tag
              shell: bash
              run: |
                  if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                      echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
                  elif [[ -n "${{ inputs.tag }}" ]]; then
                      echo "RELEASE_TAG=${{ inputs.tag }}" >> $GITHUB_ENV
                  fi

            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: "22"
                  registry-url: "https://npm.pkg.github.com"

            - name: Install dependencies
              run: npm ci --legacy-peer-deps
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}

            - name: Set app name
              shell: pwsh
              run: |
                  $APP_NAME = node -p "require('./package.json').productName || 'Dash'"
                  echo "REACT_APP_PACKAGE_NAME=$APP_NAME" >> $env:GITHUB_ENV
                  echo "REACT_APP_APP_NAME=$APP_NAME" >> $env:GITHUB_ENV

            - name: Prepare environment
              shell: pwsh
              run: Copy-Item .env.default .env

            - name: Build Tailwind CSS
              run: npm run build:css

            - name: Build React app
              run: npx craco build

            - name: Build Electron app
              run: npx electron-forge make --arch=x64
              env:
                  NODE_ENV: production

            - name: Upload to GitHub Release
              if: env.RELEASE_TAG != ''
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  TAG="${{ env.RELEASE_TAG }}"
                  for i in 1 2 3; do
                      if gh release view "$TAG" &>/dev/null; then
                          gh release upload "$TAG" out/make/squirrel.windows/x64/*.exe --clobber && exit 0
                      else
                          gh release create "$TAG" out/make/squirrel.windows/x64/*.exe --generate-notes && exit 0
                      fi
                      echo "Attempt $i failed, retrying in 30s..."
                      sleep 30
                  done
                  echo "All upload attempts failed"
                  exit 1

            - name: Upload as artifact
              if: env.RELEASE_TAG == ''
              uses: actions/upload-artifact@v6
              with:
                  name: electron-app-windows
                  path: |
                      out/make/squirrel.windows/x64/*.exe
