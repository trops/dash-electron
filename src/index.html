<!DOCTYPE html>
<html lang="en">
    <head>
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: https://cdn.jsdelivr.net; worker-src 'self' blob:; connect-src 'self' https: http://localhost:3000 ws://localhost:3000"
        />
        <meta charset="utf-8" />
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Dash" />
        <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link
            rel="preload"
            href="%PUBLIC_URL%/tailwind.css"
            as="style"
            onload="this.onload=null;this.rel='stylesheet'"
        />
        <noscript
            ><link rel="stylesheet" href="%PUBLIC_URL%/tailwind.css"
        /></noscript>
        <title>Dash</title>
        <script>
            window.global = window;
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <style>
            body {
                margin: 0;
            }
            #root-loader {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background: #171717;
                color: #a3a3a3;
                font-family: system-ui;
                font-size: 14px;
            }
        </style>
        <div id="root-loader"></div>
        <div id="root"></div>
        <script>
            const observer = new MutationObserver(() => {
                const root = document.getElementById("root");
                if (root && root.children.length > 0) {
                    document.getElementById("root-loader")?.remove();
                    observer.disconnect();
                }
            });
            observer.observe(document.getElementById("root"), {
                childList: true,
            });
        </script>
        <script>
            console.log("===== HTML LOADED =====");
            console.log(
                "Root element exists:",
                !!document.getElementById("root")
            );

            // Check if bundle script is loaded
            window.addEventListener("DOMContentLoaded", () => {
                const scripts = document.getElementsByTagName("script");
                console.log("Total scripts found:", scripts.length);
                for (let script of scripts) {
                    console.log("Script src:", script.src || "inline");
                }
            });

            window.addEventListener(
                "error",
                function (e) {
                    console.error("Global error:", e.error || e.message);
                    document.body.innerHTML +=
                        '<div style="color: red; padding: 20px; font-size: 18px;">ERROR: ' +
                        (e.message || e.error) +
                        "</div>";
                },
                true
            );
        </script>
    </body>
</html>
